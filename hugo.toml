baseURL = 'https://nainablog.vercel.app/'
languageCode = "en"
title = "ijadux2's website"
theme = "hugo-theme-monochrome"
defaultContentLanguage = "en"
enableEmoji = true

[languages.en]
languageName = "English"
weight = 1
author = "Ijadux2"

[taxonomies]
category = "categories"
tag = "tags"

[outputs]
home = ["HTML", "RSS", "JSON"]

[params]
author = "Ijadux2"
description = "My personal portfolio website"
navbar_title = "ijadux2 Portfolio"
footer = "Copyright © 2025 by Ijadux2"
color_scheme = "dark"
enable_toc = true
toc_position = "right"
enable_site_search = true

[params.profile]
enabled = true
image = "images/profile.jpg"
name = "Kumar Vaibhav"
tagline = "System Programmer & Automation Expert"

[params.social]
github = "ijadux2"
email = "kv26102009@gmail.com"

[params.list_layout]
enable_group_by_year = true
enable_show_date = true
enable_pagination = false

[params.syntax_highlight]
lib = "builtin"
[params.syntax_highlight.builtin]
enable_code_copy = true

[markup]
[markup.highlight]
codeFences = true
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true

[sitemap]
changefreq = "weekly"
priority = 0.5
filename = "sitemap.xml"

[[menu.navbar]]
identifier = "home"
name = "Home"
url = "/"
weight = 1

[[menu.navbar]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 2

[[menu.navbar]]
identifier = "about"
name = "About"
url = "/about/"
weight = 3
