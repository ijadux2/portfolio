baseURL = 'https://example.com/'
theme = "mana"
defaultContentLanguage = "en"

[languages.en]
  languageCode = "en-US"
  languageName = "English"
  languageDirection = "ltr"
  contentDir = "content"
  weight = 1
  title = "My Portfolio"

  [languages.en.params]
    description = "My personal portfolio website"
    author = "Your Name"
    heroTitleLine1 = "MY PORTFOLIO"
    heroTitleLine2 = "Welcome to my personal website"
    custom404Message = "Sorry, the page you are looking for could not be found."
    footerText = "Built with Hugo and Mana theme"

  [[languages.en.menus.main]]
    name = "Home"
    pageRef = "/"
    weight = 10

  [[languages.en.menus.main]]
    name = "Posts"
    pageRef = "/posts"
    weight = 20

  [[languages.en.menus.main]]
    name = "Tags"
    pageRef = "/tags"
    weight = 30

  [[languages.en.menus.main]]
    name = "About"
    url = "/about/"
    weight = 40

[pagination]
  pageSize = 10

[markup]
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 6
    ordered = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    noClasses = false
    style = "catppuccin-mocha"

[outputs]
  home = ["HTML", "JSON"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  enableIntegrity = false
  description = "My personal portfolio website"
  author = "Ijadux2"
  heroTitleLine1 = "HELLO, I'M IJAD"
  heroTitleLine2 = "Developer & Linux Enthusiast"
  footerText = "Built with Hugo and Mana theme"

  [params.social]
    github = "https://github.com/ijadux2"
    email = "kv26102009@gmail.com"

  [params.avatar]
    assetPath = "profile.jpg"

  [params.codeHighlight]
    darkTheme = "catppuccin-mocha"
    lightTheme = "catppuccin-frappe"

  [params.copyright]
    startYear = 2025
    owner = "Ijadux2"

  [params.admonitions]
    alertStyle = "favicon"

  [params.favicons]
    ico = "/favicon/logo-transparent/favicon.ico"
    png = "/favicon/logo-transparent/favicon.png"
    png16 = "/favicon/logo-transparent/favicon-16x16.png"
    png32 = "/favicon/logo-transparent/favicon-32x32.png"
    apple180 = "/favicon/logo-transparent/apple-touch-icon.png"
    android192 = "/favicon/logo-transparent/android-chrome-192x192.png"
    android512 = "/favicon/logo-transparent/android-chrome-512x512.png"
    manifest = "/favicon/logo-transparent/site.webmanifest"
